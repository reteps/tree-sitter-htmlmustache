name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    # Only publish for parser releases (v*), not LSP releases (lsp-v*)
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - run: npm publish --provenance --access public
